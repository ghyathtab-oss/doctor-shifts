<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مناوبات السنة الأولى</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
/* RESET */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Cairo", sans-serif;
  background: #eef3f8;
  padding: 25px;
}

/* HEADER */
h2 {
  text-align: center;
  font-size: 34px;
  font-weight: 900;
  color: #0a3d62;
  margin-bottom: 35px;
}

/* MAIN CARDS */
.card {
  background: white;
  padding: 25px;
  margin: 18px 0;
  border-radius: 20px;
  box-shadow: 0 8px 22px rgba(0,0,0,0.10);
  cursor: pointer;
  transition: 0.25s ease;
  border-right: 10px solid #0a3d62;
  display: flex;
  align-items: center;
  gap: 20px;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 14px 30px rgba(0,0,0,0.15);
}

.avatar {
  width: 75px;
  height: 75px;
  border-radius: 50%;
  background: #d0e6ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 45px;
  color: #0a3d62;
  flex-shrink: 0;
}

.card strong {
  font-size: 24px;
  color: #0a3d62;
  font-weight: 800;
}

/* SHIFT CARDS */
.shift-card {
  background: white;
  padding: 22px;
  margin: 16px 0;
  border-radius: 16px;
  box-shadow: 0 5px 16px rgba(0,0,0,0.08);
  border-right: 8px solid #1e90ff;
  transition: 0.2s ease;
}

.shift-card:hover {
  transform: scale(1.01);
}

.shift-card strong {
  font-size: 20px;
  color: #0a3d62;
}

/* BACK BUTTON */
.back-btn {
  background: #1e90ff;
  color: white;
  padding: 14px 22px;
  border: none;
  border-radius: 12px;
  margin-bottom: 20px;
  cursor: pointer;
  font-size: 18px;
  font-weight: 700;
  transition: 0.2s ease;
}

.back-btn:hover {
  background: #0f6fcc;
}

/* LISTS */
ul { margin-top: 8px; padding-left: 20px; }
li { font-size: 17px; color: #333; margin-bottom: 4px; }
</style>
</head>

<body>

<h2>مناوبات السنة الأولى</h2>

<div id="list"></div>
<div id="details" style="display:none;"></div>

<script>
let data = [];

/* قاعدة بيانات أسماء */
const femaleNames = [
  "فاطمة","سارة","ريم","نور","هبة","مها","رنا","لين","شهد","مريم","بتول","فرح","سلمى"
];

const maleNames = [
  "غياث","عمر","أحمد","محمد","عبد","مصطفى","شاكر","ريان","أمير","قصاب","دهان","وفائي","كلارجي"
];

/* تحديد الجنس */
function getAvatar(name) {
  const first = name.split(" ")[0];

  if (femaleNames.includes(first)) return "👩‍⚕️";
  if (maleNames.includes(first)) return "👨‍⚕️";

  return "🧑‍⚕️"; // محايد
}

async function loadExcel() {
  const file = await fetch('shifts.xlsx');
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: 'array' });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  data = XLSX.utils.sheet_to_json(sheet);
  showResidents();
}

function showResidents() {
  const list = document.getElementById('list');
  const details = document.getElementById('details');
  list.innerHTML = "";
  details.style.display = "none";

  const firstYear = data.filter(r => r['السنة'] === "أولى");
  const names = [...new Set(firstYear.map(r => r['الأسماء']))];

  names.forEach(name => {
    const card = document.createElement('div');
    card.className = "card";
    card.innerHTML = `
      <div class="avatar">${getAvatar(name)}</div>
      <strong>${name}</strong>
    `;
    card.onclick = () => showShifts(name);
    list.appendChild(card);
  });
}

function showShifts(name) {
  const list = document.getElementById('list');
  const details = document.getElementById('details');
  list.innerHTML = "";
  details.style.display = "block";

  const back = document.createElement('button');
  back.className = "back-btn";
  back.innerHTML = "رجوع";
  back.onclick = showResidents;

  details.innerHTML = "";
  details.appendChild(back);

  const shifts = data.filter(r => r['الأسماء'] === name && r['السنة'] === "أولى");

  shifts.forEach(r => {
    const card = document.createElement('div');
    card.className = "shift-card";

    const sameDay = data.filter(x =>
      x['التاريخ'] === r['التاريخ'] &&
      x['الفرز'] === r['الفرز'] &&
      x['السنة'] === "ثانية"
    );

    let others = "";
    sameDay.forEach(x => {
      others += `<li>${x['الأسماء']}</li>`;
    });

    card.innerHTML = `
      <strong>${r['التاريخ']}</strong><br>
      الفرز: ${r['الفرز']}<br><br>
      <strong>معه من السنة الثانية:</strong>
      <ul>${others || "<li>لا يوجد</li>"}</ul>
    `;

    details.appendChild(card);
  });
}

loadExcel();
</script>

</body>
</html>
