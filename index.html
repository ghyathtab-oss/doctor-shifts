<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>قسم الجراحة العامة – لوحة المناوبات</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Cairo", sans-serif;
  background: #f3f7fb;
  display: flex;
}

/* ========== SIDEBAR ========== */
.sidebar {
  width: 250px;
  background: #ffffff;
  height: 100vh;
  padding: 28px 20px;
  color: #0f172a;
  border-left: 1px solid #e2e8f0;
  box-shadow: 6px 0 20px rgba(0,0,0,0.05);
  position: fixed;
}

.sidebar-title {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 30px;
  color: #0284c7;
}

.sidebar-item {
  padding: 14px 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: #334155;
}

.sidebar-item:hover {
  background: #e0f2fe;
  color: #0369a1;
}

.sidebar-item.active {
  background: #0284c7;
  color: white;
}

/* ========== MAIN AREA ========== */
.main {
  margin-right: 250px;
  width: calc(100% - 250px);
}

/* TOPBAR */
.topbar {
  background: white;
  padding: 18px 28px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  font-size: 20px;
  font-weight: 800;
  color: #0f172a;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar-badge {
  background: #0284c7;
  color: white;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
}

/* CONTENT */
.content {
  padding: 28px;
}

/* TITLE */
h2 {
  font-size: 28px;
  font-weight: 900;
  color: #0f172a;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 14px;
  color: #64748b;
  margin-bottom: 25px;
}

/* GRID */
#list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 22px;
}

/* CARD */
.card {
  background: white;
  padding: 22px;
  border-radius: 18px;
  color: #0f172a;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  cursor: pointer;
  transition: 0.25s ease;
  border: 1px solid #e2e8f0;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.12);
  border-color: #0284c7;
}

/* CARD HEADER */
.card-header {
  display: flex;
  align-items: center;
  gap: 14px;
}

.avatar {
  width: 70px;
  height: 70px;
  border-radius: 999px;
  background: #e0f2fe;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  border: 2px solid #bae6fd;
}

/* NAME */
.card-name {
  font-size: 20px;
  font-weight: 800;
  color: #0f172a;
}

/* FOOTER */
.card-footer {
  margin-top: 14px;
  font-size: 13px;
  color: #475569;
}

/* DETAILS PAGE */
#details {
  margin-top: 20px;
}

.back-btn {
  background: #0284c7;
  color: white;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 20px;
  font-size: 14px;
  font-weight: 700;
}

/* SHIFT GRID */
.shifts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

/* SHIFT CARD */
.shift-card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  border-right: 8px solid #0284c7;
}

.shift-date {
  font-size: 16px;
  font-weight: 800;
  color: #0f172a;
}

.shift-dept {
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 999px;
  display: inline-block;
  margin-top: 6px;
  font-weight: 700;
  background: #e0f2fe;
  color: #0369a1;
}

.shift-list li {
  font-size: 14px;
  margin-top: 6px;
  color: #0f172a;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-title">قسم الجراحة العامة 🔪</div>

  <div class="sidebar-item active">📅 جدول المناوبات</div>
  <div class="sidebar-item">🧑‍⚕️ المقيمون</div>
  <div class="sidebar-item">🏥 غرف العمليات</div>
  <div class="sidebar-item">🩺 العيادات</div>
  <div class="sidebar-item">⚙️ الإعدادات</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <div>لوحة مناوبات الجراحة العامة</div>
    <div class="topbar-badge">قسم الجراحة العامة – جدول تفاعلي 🔪</div>
  </div>

  <div class="content">

    <h2>مناوبات السنة الأولى</h2>
    <div class="subtitle">اختر مقيمًا لعرض مناوباته بالتفصيل.</div>

    <div id="list"></div>
    <div id="details" style="display:none;"></div>

  </div>
</div>

<script>
let data = [];

const female = ["فاطمة","سارة","ريم","نور","هبة","مها","رنا","لين","شهد","مريم","بتول","سلمى"];
const male = ["غياث","عمر","أحمد","محمد","مصطفى","شاكر","ريان","أمير","قصاب","دهان","وفائي","كلارجي"];

function avatar(name){
  const first = name.split(" ")[0];
  if(female.includes(first)) return "👩‍⚕️";
  if(male.includes(first)) return "👨‍⚕️";
  return "🧑‍⚕️";
}

async function loadExcel(){
  const file = await fetch("shifts.xlsx");
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf,{type:"array"});
  data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
  showList();
}

function showList(){
  const list = document.getElementById("list");
  const details = document.getElementById("details");
  list.innerHTML = "";
  details.style.display = "none";

  const first = data.filter(r=>r["السنة"]==="أولى");
  const names = [...new Set(first.map(r=>r["الأسماء"]))];

  names.forEach(name=>{
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="card-header">
        <div class="avatar">${avatar(name)}</div>
        <div>
          <div class="card-name">${name}</div>
          <div class="card-footer">مقيم – سنة أولى</div>
        </div>
      </div>
    `;
    card.onclick=()=>showDetails(name);
    list.appendChild(card);
  });
}

function showDetails(name){
  const list=document.getElementById("list");
  const details=document.getElementById("details");
  list.innerHTML="";
  details.style.display="block";

  details.innerHTML=`
    <button class="back-btn" onclick="showList()">← رجوع</button>
    <h2>${avatar(name)} ${name}</h2>
    <div class="subtitle">جميع المناوبات الخاصة بهذا المقيم.</div>
    <div class="shifts-grid"></div>
  `;

  const grid = details.querySelector(".shifts-grid");

  const shifts = data.filter(r=>r["الأسماء"]===name && r["السنة"]==="أولى");

  shifts.forEach(r=>{
    const others = data.filter(x =>
      x["التاريخ"]===r["التاريخ"] &&
      x["الفرز"]===r["الفرز"] &&
      x["السنة"]==="ثانية"
    );

    const card=document.createElement("div");
    card.className="shift-card";
    card.innerHTML=`
      <div class="shift-date">${r["التاريخ"]}</div>
      <div class="shift-dept">${r["الفرز"]}</div>
      <div style="margin-top:10px;font-size:13px;color:#475569;">معه من السنة الثانية:</div>
      <ul class="shift-list">
        ${
          others.length
          ? others.map(o=>`<li>${avatar(o["الأسماء"])} ${o["الأسماء"]}</li>`).join("")
          : "<li style='color:#94a3b8;'>لا يوجد</li>"
        }
      </ul>
    `;
    grid.appendChild(card);
  });
}

loadExcel();
</script>

</body>
</html>
