<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مناوبات السنة الأولى</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
/* ====== RESET ====== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Cairo", sans-serif;
  background: #f4f7fb;
  padding: 25px;
}

/* ====== HEADER ====== */
h2 {
  text-align: center;
  font-size: 30px;
  font-weight: 800;
  color: #0a3d62;
  margin-bottom: 30px;
  letter-spacing: -1px;
}

/* ====== CARD LIST ====== */
.card {
  background: white;
  padding: 20px;
  margin: 14px 0;
  border-radius: 14px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: 0.25s ease;
  border-right: 6px solid #0a3d62;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 22px rgba(0,0,0,0.10);
}

.card strong {
  font-size: 20px;
  color: #0a3d62;
}

/* ====== SHIFT CARD ====== */
.shift-card {
  background: white;
  padding: 18px;
  margin: 12px 0;
  border-radius: 12px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.05);
  border-right: 6px solid #1e90ff;
  transition: 0.2s ease;
}

.shift-card:hover {
  transform: scale(1.01);
}

.shift-card strong {
  font-size: 18px;
  color: #0a3d62;
}

/* ====== BACK BUTTON ====== */
.back-btn {
  background: #1e90ff;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  margin-bottom: 20px;
  cursor: pointer;
  font-size: 17px;
  font-weight: 600;
  transition: 0.2s ease;
}

.back-btn:hover {
  background: #0f6fcc;
}

/* ====== LISTS ====== */
ul {
  margin-top: 8px;
  padding-left: 20px;
}

li {
  font-size: 16px;
  color: #333;
  margin-bottom: 4px;
}
</style>
</head>

<body>

<h2>مناوبات السنة الأولى</h2>

<div id="list"></div>
<div id="details" style="display:none;"></div>

<script>
let data = [];

async function loadExcel() {
  const file = await fetch('shifts.xlsx');
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: 'array' });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  data = XLSX.utils.sheet_to_json(sheet);
  showResidents();
}

function showResidents() {
  const list = document.getElementById('list');
  const details = document.getElementById('details');
  list.innerHTML = "";
  details.style.display = "none";

  const firstYear = data.filter(r => r['السنة'] === "أولى");
  const names = [...new Set(firstYear.map(r => r['الأسماء']))];

  names.forEach(name => {
    const card = document.createElement('div');
    card.className = "card";
    card.innerHTML = `<strong>${name}</strong> <span style="color:#1e90ff;font-size:22px;">›</span>`;
    card.onclick = () => showShifts(name);
    list.appendChild(card);
  });
}

function showShifts(name) {
  const list = document.getElementById('list');
  const details = document.getElementById('details');
  list.innerHTML = "";
  details.style.display = "block";

  const back = document.createElement('button');
  back.className = "back-btn";
  back.innerHTML = "رجوع";
  back.onclick = showResidents;

  details.innerHTML = "";
  details.appendChild(back);

  const shifts = data.filter(r => r['الأسماء'] === name && r['السنة'] === "أولى");

  shifts.forEach(r => {
    const card = document.createElement('div');
    card.className = "shift-card";

    const sameDay = data.filter(x =>
      x['التاريخ'] === r['التاريخ'] &&
      x['الفرز'] === r['الفرز'] &&
      x['السنة'] === "ثانية"
    );

    let others = "";
    sameDay.forEach(x => {
      others += `<li>${x['الأسماء']}</li>`;
    });

    card.innerHTML = `
      <strong>${r['التاريخ']}</strong><br>
      الفرز: ${r['الفرز']}<br><br>
      <strong>معه من السنة الثانية:</strong>
      <ul>${others || "<li>لا يوجد</li>"}</ul>
    `;

    details.appendChild(card);
  });
}

loadExcel();
</script>

</body>
</html>
