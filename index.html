<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مناوبات السنة الأولى</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: sans-serif;
  background:#f5f5f5;
  padding:20px;
}
h2 { text-align:center; color:#007bff; }
.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 0 5px #ccc;
  cursor:pointer;
}
.card:hover { background:#e9f2ff; }
.shift-card {
  background:#fff;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  box-shadow:0 0 3px #ccc;
}
.back-btn {
  background:#6c757d;
  color:white;
  padding:10px;
  border:none;
  border-radius:5px;
  margin-bottom:15px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>المقيمون السنة الأولى</h2>

<div id="list"></div>
<div id="details" style="display:none;"></div>

<script>
let data = [];

async function loadExcel() {
  const file = await fetch('shifts.xlsx');
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: 'array' });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  data = XLSX.utils.sheet_to_json(sheet);
  showResidents();
}

function showResidents() {
  const list = document.getElementById('list');
  const details = document.getElementById('details');
  list.innerHTML = "";
  details.style.display = "none";

  const firstYear = data.filter(r => r['السنة'] === "أولى");
  const names = [...new Set(firstYear.map(r => r['الأسماء']))];

  names.forEach(name => {
    const card = document.createElement('div');
    card.className = "card";
    card.innerHTML = `<strong>${name}</strong>`;
    card.onclick = () => showShifts(name);
    list.appendChild(card);
  });
}

function showShifts(name) {
  const list = document.getElementById('list');
  const details = document.getElementById('details');
  list.innerHTML = "";
  details.style.display = "block";

  const back = document.createElement('button');
  back.className = "back-btn";
  back.innerHTML = "رجوع";
  back.onclick = showResidents;

  details.innerHTML = "";
  details.appendChild(back);

  const shifts = data.filter(r => r['الأسماء'] === name && r['السنة'] === "أولى");

  shifts.forEach(r => {
    const card = document.createElement('div');
    card.className = "shift-card";

    const sameDay = data.filter(x =>
      x['التاريخ'] === r['التاريخ'] &&
      x['الفرز'] === r['الفرز'] &&
      x['السنة'] === "ثانية"
    );

    let others = "";
    sameDay.forEach(x => {
      others += `<li>${x['الأسماء']}</li>`;
    });

    card.innerHTML = `
      <strong>${r['التاريخ']}</strong><br>
      الفرز: ${r['الفرز']}<br><br>
      <strong>معه من السنة الثانية:</strong>
      <ul>${others || "<li>لا يوجد</li>"}</ul>
    `;

    details.appendChild(card);
  });
}

loadExcel();
</script>

</body>
</html>
