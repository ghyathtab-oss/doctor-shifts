<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة مناوبات المقيمين</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Cairo", sans-serif;
  background: #f1f5f9;
  display: flex;
}

/* ========== SIDEBAR ========== */
.sidebar {
  width: 260px;
  background: #0f172a;
  height: 100vh;
  padding: 28px 20px;
  color: #e2e8f0;
  box-shadow: 6px 0 20px rgba(0,0,0,0.25);
  position: fixed;
}

.sidebar-title {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 30px;
  color: #38bdf8;
}

.sidebar-item {
  padding: 14px 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-item:hover {
  background: #1e293b;
}

.sidebar-item.active {
  background: #1e40af;
  color: white;
}

/* ========== MAIN AREA ========== */
.main {
  margin-right: 260px;
  width: calc(100% - 260px);
}

/* TOPBAR */
.topbar {
  background: white;
  padding: 18px 28px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  font-size: 20px;
  font-weight: 800;
  color: #0f172a;
}

/* CONTENT */
.content {
  padding: 28px;
}

/* TITLE */
h2 {
  font-size: 28px;
  font-weight: 900;
  color: #0f172a;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 14px;
  color: #64748b;
  margin-bottom: 25px;
}

/* GRID */
#list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 22px;
}

/* CARD */
.card {
  background: linear-gradient(135deg, #1e3a8a, #0f172a);
  padding: 22px;
  border-radius: 18px;
  color: white;
  box-shadow: 0 12px 30px rgba(0,0,0,0.25);
  cursor: pointer;
  transition: 0.25s ease;
  border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.35);
}

/* CARD HEADER */
.card-header {
  display: flex;
  align-items: center;
  gap: 14px;
}

.avatar {
  width: 70px;
  height: 70px;
  border-radius: 999px;
  background: rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
}

/* NAME */
.card-name {
  font-size: 20px;
  font-weight: 800;
}

/* FOOTER */
.card-footer {
  margin-top: 14px;
  font-size: 13px;
  opacity: 0.9;
}

/* DETAILS PAGE */
#details {
  margin-top: 20px;
}

.back-btn {
  background: #1e40af;
  color: white;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 20px;
  font-size: 14px;
  font-weight: 700;
}

.shifts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

/* SHIFT CARD */
.shift-card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.12);
  border-right: 8px solid #1e40af;
}

.shift-date {
  font-size: 16px;
  font-weight: 800;
  color: #0f172a;
}

.shift-dept {
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 999px;
  display: inline-block;
  margin-top: 6px;
  font-weight: 700;
}

/* COLORS */
.shift-dept.er { background: #fee2e2; color: #b91c1c; }
.shift-dept.icu { background: #dbeafe; color: #1e3a8a; }
.shift-dept.ward { background: #dcfce7; color: #166534; }
.shift-dept.cold { background: #e2e8f0; color: #475569; }

.shift-list li {
  font-size: 14px;
  margin-top: 6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-title">نظام المناوبات</div>

  <div class="sidebar-item active">📅 جدول المناوبات</div>
  <div class="sidebar-item">🧑‍⚕️ المقيمون</div>
  <div class="sidebar-item">🏥 الأقسام</div>
  <div class="sidebar-item">📊 الإحصائيات</div>
  <div class="sidebar-item">⚙️ الإعدادات</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">لوحة مناوبات المقيمين</div>

  <div class="content">

    <h2>مناوبات السنة الأولى</h2>
    <div class="subtitle">اختر مقيمًا لعرض مناوباته بالتفصيل.</div>

    <div id="list"></div>
    <div id="details" style="display:none;"></div>

  </div>
</div>

<script>
let data = [];

const female = ["فاطمة","سارة","ريم","نور","هبة","مها","رنا","لين","شهد","مريم","بتول","سلمى"];
const male = ["غياث","عمر","أحمد","محمد","مصطفى","شاكر","ريان","أمير","قصاب","دهان","وفائي","كلارجي"];

function avatar(name){
  const first = name.split(" ")[0];
  if(female.includes(first)) return "👩‍⚕️";
  if(male.includes(first)) return "👨‍⚕️";
  return "🧑‍⚕️";
}

function deptClass(d){
  if(d==="اسعاف") return "er";
  if(d==="عناية") return "icu";
  if(d==="جناح") return "ward";
  if(d==="بارد") return "cold";
  return "";
}

async function loadExcel(){
  const file = await fetch("shifts.xlsx");
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf,{type:"array"});
  data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
  showList();
}

function showList(){
  const list = document.getElementById("list");
  const details = document.getElementById("details");
  list.innerHTML = "";
  details.style.display = "none";

  const first = data.filter(r=>r["السنة"]==="أولى");
  const names = [...new Set(first.map(r=>r["الأسماء"]))];

  names.forEach(name=>{
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="card-header">
        <div class="avatar">${avatar(name)}</div>
        <div>
          <div class="card-name">${name}</div>
          <div class="card-footer">مقيم – سنة أولى</div>
        </div>
      </div>
    `;
    card.onclick=()=>showDetails(name);
    list.appendChild(card);
  });
}

function showDetails(name){
  const list=document.getElementById("list");
  const details=document.getElementById("details");
  list.innerHTML="";
  details.style.display="block";

  details.innerHTML=`
    <button class="back-btn" onclick="showList()">← رجوع</button>
    <h2>${avatar(name)} ${name}</h2>
    <div class="subtitle">جميع المناوبات الخاصة بهذا المقيم.</div>
    <div class="shifts-grid"></div>
  `;

  const grid = details.querySelector(".shifts-grid");

  const shifts = data.filter(r=>r["الأسماء"]===name && r["السنة"]==="أولى");

  shifts.forEach(r=>{
    const others = data.filter(x =>
      x["التاريخ"]===r["التاريخ"] &&
      x["الفرز"]===r["الفرز"] &&
      x["السنة"]==="ثانية"
    );

    const card=document.createElement("div");
    card.className="shift-card";
    card.innerHTML=`
      <div class="shift-date">${r["التاريخ"]}</div>
      <div class="shift-dept ${deptClass(r["الفرز"])}">${r["الفرز"]}</div>
      <div style="margin-top:10px;font-size:13px;color:#475569;">معه من السنة الثانية:</div>
      <ul class="shift-list">
        ${
          others.length
          ? others.map(o=>`<li>${avatar(o["الأسماء"])} ${o["الأسماء"]}</li>`).join("")
          : "<li style='color:#94a3b8;'>لا يوجد</li>"
        }
      </ul>
    `;
    grid.appendChild(card);
  });
}

loadExcel();
</script>

</body>
</html>
